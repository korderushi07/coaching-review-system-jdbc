<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coaching Review System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; color: #333; }

        header {
          background: #4f46e5; color: white;
          padding: 20px; text-align: center;
          font-size: 24px; font-weight: bold;
        }

        .tabs {
          display: flex; justify-content: center;
          gap: 10px; padding: 20px; flex-wrap: wrap;
        }

        .tab-btn {
          padding: 10px 20px; border: none;
          background: #e0e7ff; border-radius: 8px;
          cursor: pointer; font-size: 14px;
        }

        .tab-btn.active { background: #4f46e5; color: white; }

        .section { display: none; max-width: 800px; margin: 0 auto; padding: 20px; }
        .section.active { display: block; }

        .card {
          background: white; border-radius: 12px;
          padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        input, textarea {
          width: 100%; padding: 10px;
          margin: 8px 0 16px; border: 1px solid #ddd;
          border-radius: 8px; font-size: 14px;
        }

        label { font-weight: bold; font-size: 14px; }

        button.submit-btn {
          background: #4f46e5; color: white;
          padding: 12px 24px; border: none;
          border-radius: 8px; cursor: pointer;
          font-size: 15px; width: 100%;
        }

        button.submit-btn:hover { background: #3730a3; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #4f46e5; color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        tr:hover { background: #f9f9f9; }

        .action-btn {
          padding: 6px 12px; border: none;
          border-radius: 6px; cursor: pointer;
        }
        .del-btn { background: #fee2e2; color: #dc2626; }
        .msg { margin-top: 12px; color: green; font-weight: bold; }
    </style>
</head>
<body>

<header>🎓 Coaching Review System</header>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('add')">➕ Add Review</button>
    <button class="tab-btn" onclick="showTab('view')">📋 View Reviews</button>
    <button class="tab-btn" onclick="showTab('update')">✏️ Update Review</button>
    <button class="tab-btn" onclick="showTab('delete')">🗑️ Delete Review</button>
    <button class="tab-btn" onclick="showTab('search')">🔍 Search</button>
</div>

<!-- ADD -->
<div id="add" class="section active">
    <div class="card">
        <h2>Add New Review</h2><br>
        <label>Review ID</label>
        <input type="number" id="a-id" placeholder="e.g. 101">
        <label>Coaching Name</label>
        <input type="text" id="a-coaching" placeholder="e.g. Aakash Institute">
        <label>Faculty Name</label>
        <input type="text" id="a-faculty" placeholder="e.g. Dr. Sharma">
        <label>Rating (1-5)</label>
        <input type="number" id="a-rating" min="1" max="5">
        <label>Review</label>
        <textarea id="a-review" rows="3" placeholder="Write your review..."></textarea>
        <label>Student Name</label>
        <input type="text" id="a-student" placeholder="Your name">
        <button class="submit-btn" onclick="addReview()">Add Review</button>
        <p class="msg" id="add-msg"></p>
    </div>
</div>

<!-- VIEW -->
<div id="view" class="section">
    <div class="card">
        <h2>All Reviews</h2>
        <button class="submit-btn" onclick="loadReviews()" style="width:auto;padding:10px 20px;margin-bottom:16px">
            🔄 Load Reviews
        </button>
        <table>
            <thead>
            <tr><th>ID</th><th>Coaching</th><th>Faculty</th><th>Rating</th><th>Review</th><th>Student</th></tr>
            </thead>
            <tbody id="reviews-table"></tbody>
        </table>
    </div>
</div>

<!-- UPDATE -->
<div id="update" class="section">
    <div class="card">
        <h2>Update Review Rating</h2><br>
        <label>Review ID</label>
        <input type="number" id="u-id" placeholder="Enter Review ID">
        <label>New Rating (1-5)</label>
        <input type="number" id="u-rating" min="1" max="5">
        <button class="submit-btn" onclick="updateReview()">Update Rating</button>
        <p class="msg" id="update-msg"></p>
    </div>
</div>

<!-- DELETE -->
<div id="delete" class="section">
    <div class="card">
        <h2>Delete a Review</h2><br>
        <label>Review ID</label>
        <input type="number" id="d-id" placeholder="Enter Review ID to delete">
        <button class="submit-btn" style="background:#dc2626" onclick="deleteReview()">Delete Review</button>
        <p class="msg" id="delete-msg"></p>
    </div>
</div>

<!-- SEARCH -->
<div id="search" class="section">
    <div class="card">
        <h2>Search by Coaching Name</h2><br>
        <label>Coaching Name</label>
        <input type="text" id="s-name" placeholder="e.g. Aakash Institute">
        <button class="submit-btn" onclick="searchReviews()">Search</button>
        <table style="margin-top:16px">
            <thead>
            <tr><th>ID</th><th>Coaching</th><th>Faculty</th><th>Rating</th><th>Review</th><th>Student</th></tr>
            </thead>
            <tbody id="search-table"></tbody>
        </table>
    </div>
</div>

<script>
    const API = "http://localhost:8080/api/reviews";

    function showTab(name) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(name).classList.add('active');
      event.target.classList.add('active');
    }

    async function addReview() {
      const review = {
        id: parseInt(document.getElementById('a-id').value),
        coachingName: document.getElementById('a-coaching').value,
        facultyName: document.getElementById('a-faculty').value,
        rating: parseInt(document.getElementById('a-rating').value),
        review: document.getElementById('a-review').value,
        studentName: document.getElementById('a-student').value
      };
      await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(review) });
      document.getElementById('add-msg').textContent = '✅ Review Added Successfully!';
    }

    async function loadReviews() {
      const res = await fetch(API);
      const data = await res.json();
      const tbody = document.getElementById('reviews-table');
      tbody.innerHTML = data.map(r =>
        `<tr><td>${r.id}</td><td>${r.coachingName}</td><td>${r.facultyName}</td>
         <td>${r.rating}⭐</td><td>${r.review}</td><td>${r.studentName}</td></tr>`
      ).join('');
    }

    async function updateReview() {
      const id = document.getElementById('u-id').value;
      const rating = parseInt(document.getElementById('u-rating').value);
      await fetch(`${API}/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({rating}) });
      document.getElementById('update-msg').textContent = '✅ Rating Updated!';
    }

    async function deleteReview() {
      const id = document.getElementById('d-id').value;
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      document.getElementById('delete-msg').textContent = '✅ Review Deleted!';
    }

    async function searchReviews() {
      const name = document.getElementById('s-name').value;
      const res = await fetch(`${API}/search?name=${name}`);
      const data = await res.json();
      const tbody = document.getElementById('search-table');
      tbody.innerHTML = data.map(r =>
        `<tr><td>${r.id}</td><td>${r.coachingName}</td><td>${r.facultyName}</td>
         <td>${r.rating}⭐</td><td>${r.review}</td><td>${r.studentName}</td></tr>`
      ).join('');
    }
</script>
</body>
</html>
